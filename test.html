<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Test</title>
<style>
body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f5f5f5;padding:20px;}
h2{margin-bottom:30px;text-align:center;}
.big-btn{display:block;width:100%;max-width:400px;padding:24px;background:#B23A55;color:white;text-align:center;border-radius:16px;font-size:20px;font-weight:bold;margin-bottom:20px;text-decoration:none;}
.big-btn:active{opacity:0.8;}
p{text-align:center;color:#666;font-size:14px;}
</style>
</head>
<body>
<h2>Tap the button below</h2>

<a class="big-btn" href="https://www.amazon.com">
  TAP HERE — Open Amazon
</a>

<p>If Amazon opens, links are working fine.<br>If nothing happens, it is a browser issue.</p>
</body>
</html>
